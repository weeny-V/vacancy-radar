services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vacancy
      POSTGRES_PASSWORD: vacancy
      POSTGRES_DB: vacancy_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://vacancy:vacancy@postgres:5432/vacancy_radar?schema=public
      REDIS_URL: redis://redis:6379
      API_PORT: 4000
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env.example
    environment:
      DATABASE_URL: postgresql://vacancy:vacancy@postgres:5432/vacancy_radar?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.example
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:
